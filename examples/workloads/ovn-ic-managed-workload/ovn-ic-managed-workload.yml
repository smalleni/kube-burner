---
global:
  gc: false
  indexerConfig:
    esServers: ["https://search-perfscale-dev-chmf5l4sh66lvxbnadi4bznl3a.us-west-2.es.amazonaws.com"]
    insecureSkipVerify: true
    defaultIndex: ripsaw-kube-burner
    type: elastic
  measurements:
    - name: podLatency
jobs:
  - name: ovn-ic-managed-workload
    namespace: ovn-ic-managed-workload
    jobIterations: 650
    qps: 20
    burst: 20
    namespacedIterations: true
    podWait: false
    waitWhenFinished: true
    preLoadImages: true
    preLoadPeriod: 15s
    churn: true
    churnDuration: 1h
    churnPercent: 10
    churnDelay: 5m
    namespaceLabels:
      security.openshift.io/scc.podSecurityLabelSync: false
      pod-security.kubernetes.io/enforce: privileged
      pod-security.kubernetes.io/audit: privileged
      pod-security.kubernetes.io/warn: privileged
    objects:

      - objectTemplate: service.yml
        replicas: 1

      - objectTemplate: service-np.yml
        replicas: 1

      - objectTemplate: route.yml
        replicas: 1

      - objectTemplate: route-np.yml
        replicas: 1

      - objectTemplate: np-allow-from-clients.yml
        replicas: 1

      - objectTemplate: np-allow-from-ingress.yml
        replicas: 1

      - objectTemplate: imagestream.yml
        replicas: 1

      - objectTemplate: build.yml
        replicas: 1

      - objectTemplate: deployment-server.yml
        replicas: 2
        inputVars:
          podReplicas: 2

      - objectTemplate: deployment-client-1.yml
        replicas: 1
        inputVars:
          podReplicas: 2
          ingressDomain: apps.sai-ovnic.5a4o.s1.devshift.org

      - objectTemplate: deployment-client-2.yml
        replicas: 1
        inputVars:
          podReplicas: 1
          ingressDomain: apps.sai-ovnic.5a4o.s1.devshift.org

      - objectTemplate: secret.yml
        replicas: 18

      - objectTemplate: configmap.yml
        replicas: 8
